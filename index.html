<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>ГЛЕЕЕЕБ</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: black;
    color: white;
}

/* Крупный центрированный текст */
.text {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    font-size: 48px;
    text-align: center;
}

/* Фото на весь экран */
.full-img {
    width: 100%;
    height: 100vh;
    object-fit: cover;
    display: block;
}

/* Блок с двумя картинками */
.duo {
    display: flex;
    height: 100vh;
}

.duo img {
    width: 50%;
    height: 100%;
    object-fit: cover;
}

/* Кнопка */
.button {
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.button a {
    font-size: 40px;
    color: white;
    text-decoration: none;
    border: 2px solid white;
    padding: 20px 40px;
    transition: 0.3s;
}

.button a:hover {
    background: white;
    color: black;
}

</style>

</head>

<body>

<!-- Текст -->
<div class="text">это сука глеб</div>

<!-- Фото -->
<img class="full-img" src="imgs/img1.jfif">

<!-- Текст -->
<div class="text">глебу уже 18 бля лет</div>

<!-- Фото -->
<img class="full-img" src="imgs/img2.jfif">

<!-- Текст -->
<div class="text">это бля жестко</div>

<!-- Фото -->
<img class="full-img" src="imgs/img3.jfif">

<!-- Текст -->
<div class="text">с днем рождения глеб!!!</div>

<!-- Фото -->
<img class="full-img" src="imgs/img4.jfif">

<!-- Текст -->
<div class="text">FUCK OLD GLEB</div>

<!-- Две фотки -->
<div class="duo">
    <img src="imgs/img5.jfif">
    <img src="imgs/img6.jfif">
</div>

<!-- Финальный текст -->
<div class="text">MEET THE NEW GLEB😈😈</div>

<!-- Кнопка на видео -->
<div class="button">
    <a href="https://drive.google.com/file/d/1RGVeRdMfZBWO10FaQ1GQeM8w9XKKZpBA/view?usp=sharing" target="_blank">
        ▶ Смотреть видео
    </a>
</div>

</body>
</html>
